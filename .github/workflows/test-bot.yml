# Discovers uncovered modules, generates unit tests via LLM, verifies, and opens a PR.
name: Test bot

on:
  schedule:
    # Sundays 07:00 UTC
    - cron: "0 7 * * 0"
  workflow_dispatch:
    inputs:
      max_targets:
        description: Max source files to generate tests for
        required: false
        default: "2"
      dry_run:
        description: Discover and generate only (no commit/PR)
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: test-bot-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  test-bot:
    name: Generate tests and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install test bot
        run: python -m pip install -e ./scripts/test-bot

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run test bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TEST_BOT_MAX_TARGETS: ${{ inputs.max_targets || '2' }}
          TEST_BOT_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          TEST_BOT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repository secret is required."
            exit 1
          fi
          test-bot --max-targets "${TEST_BOT_MAX_TARGETS}" ${{ inputs.dry_run && '--dry-run' || '' }}
